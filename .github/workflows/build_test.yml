name: Test to convert Markdown to PDF

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'README.md'
      - '.github/workflows/*.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == false
    steps:
      - name: git checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      # Doc: https://github.com/marketplace/actions/markdownlint-cli2-action
      - name: markdown linter
        uses: DavidAnson/markdownlint-cli2-action@07035fd053f7be764496c0f8d8f9f41f98305101 # v0.17.2
        with:
          fix: true
          config: 'config/.markdownlint.json'
          globs: |
            README.md

      - name: install pdf toolchain
        run: bash scripts/install-pdf-deps.sh

      - name: convert markdown to pdf
        run: pandoc README.md --defaults=config/pandoc/pdf.yml

      - name: upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: my-resume
          path: resume.pdf
